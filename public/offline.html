<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Offline — Lost & Found Pets</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: system-ui, -apple-system, sans-serif;
        background: #0a0a0a;
        color: #ededed;
        text-align: center;
      }
      main {
        max-width: 360px;
      }
      h1 {
        font-size: 1.5rem;
        margin: 0 0 12px;
      }
      p {
        margin: 0 0 20px;
        color: #a3a3a3;
        line-height: 1.5;
      }
      button {
        background: #3b82f6;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 10px 16px;
        font-size: 1rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>
        The app shell is available, but map data and live updates need an
        internet connection.
      </p>
      <button type="button" onclick="window.location.reload()">
        Try again
      </button>
    </main>
  </body>
</html>
