
[functions.verify-captcha]
enabled = true
verify_jwt = true
import_map = "./functions/verify-captcha/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/verify-captcha/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/verify-captcha/*.html" ]

[functions.send-push-on-notification]
enabled = true
verify_jwt = false
import_map = "./functions/send-push-on-notification/deno.json"
entrypoint = "./functions/send-push-on-notification/index.ts"
